<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스시밥 재고 관리</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>스시밥 재고 & 오픈 영수증</h1>

      <section class="card notice-board notice-board-top">
        <h2>매장 공지 알림판</h2>
        <p class="hint">현재 선택한 매장 이름으로 메모가 등록되고, 전체 직원이 함께 봅니다.</p>
        <form id="noticeForm" class="row-form">
          <input id="noticeInput" type="text" maxlength="120" placeholder="예: 오늘 저녁 바쁠 것 같음" required />
          <button type="submit">공지 등록</button>
        </form>
        <ul id="noticeList" class="notice-list"></ul>
      </section>

      <section class="card">
        <h2>매장별 재고</h2>
        <p class="hint">왼쪽 ☰ 핸들을 드래그해 순서를 바꾸고, 오른쪽에서 삭제할 수 있습니다.</p>
        <div id="storeTabs" class="tabs"></div>
        <div id="inventoryList" class="inventory-list"></div>

        <form id="addItemForm" class="row-form">
          <input id="newItemName" type="text" placeholder="새 재고명 (예: 새우튀김)" required />
          <input id="newItemQty" type="number" min="0" placeholder="수량" required />
          <button type="submit">재고 추가</button>
        </form>
      </section>

      <section class="card">
        <h2>Opened Bill (미결제 영수증)</h2>
        <form id="billForm" class="row-form">
          <input id="billCompany" type="text" placeholder="회사명" required />
          <input id="billDate" type="date" required />
          <input id="billAmount" type="text" inputmode="numeric" placeholder="금액 (EUR, 예: 1,200)" required />
          <input id="billReference" type="text" placeholder="참고 (선택)" />
          <button type="submit">영수증 등록</button>
        </form>
        <ul id="billList" class="bill-list"></ul>
      </section>

      <section class="card">
        <h2>결제 완료 영수증 (최근 10개)</h2>
        <p class="hint">되돌리기 버튼은 미결제 영수증 창으로 되돌립니다. 기록에서 삭제를 누르면 리스트에서 사라집니다.</p>
        <ul id="paidBillList" class="bill-list"></ul>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/main.js"></script>
  </body>
  </html>
